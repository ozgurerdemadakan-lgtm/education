<!DOCTYPE html>
<html lang="ku">
    <head>
        <title>Malpera Main</title>
        <link rel=" stylesheet" href="style.css">
    </head>
    <script>
        function selam() {
            let isim = document .getElementById("isim").value;
            let email = document.getElementById("email").value;
            
            if (isim ==="" || email === "") {
                document.getElementById("sonuc").innerHTML = "Nave xwe u emaila xwe binivise";
            }else{
                document.getElementById("sonuc").innerHTML = "silav"+isim+"-"+"emaila te"+email;
            }
        }
    </script>
    <body>
        <h1 style ="color: red; font-size:50px;">Sernave Mezin</h1>
        <h2>Sernave navin</h2>
        <h3>Sernave Biçuk</h3>

        <p>Ev malpera maine.</p>
        <p id="yazi">ez kod fem dikim</p>
        
        <input id="isim" placeholder="Nave xwe binivise">
        <input id="email" placeholder="emaila xwe">
        <button onclick="selam()">pıleke</button>
        <p id="sonuc"></p>
    </body>
</html>
